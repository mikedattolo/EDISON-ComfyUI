<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDISON System Doctor</title>
  <link rel="stylesheet" href="page-theme.css?v=1" />
  <link rel="stylesheet" href="workspace-shell.css?v=6" />
  <script src="page-theme.js?v=1" defer></script>
  <script src="workspace-shell.js?v=6" defer></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Manrope", "Segoe UI", sans-serif; color: var(--ink, #f8fafc); background: radial-gradient(circle at 20% 0%, rgba(45,212,191,.15), transparent 34%), radial-gradient(circle at 84% 8%, rgba(248,113,113,.16), transparent 38%), var(--background, #08111f); }
    .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 16px 20px; background: rgba(5,10,18,.84); border-bottom: 1px solid var(--line, rgba(148,163,184,.22)); backdrop-filter: blur(16px); }
    h1 { margin: 0; font-size: 24px; }
    .subtitle { margin: 4px 0 0; color: var(--muted, #94a3b8); font-size: 13px; max-width: 940px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn { border: 1px solid rgba(148,163,184,.25); border-radius: 12px; padding: 10px 14px; background: linear-gradient(180deg, rgba(30,41,59,.92), rgba(15,23,42,.92)); color: var(--ink, #e2e8f0); font: inherit; font-size: 13px; cursor: pointer; text-decoration: none; }
    .btn.primary { background: linear-gradient(135deg, #38bdf8, #2dd4bf 58%, #a3e635); color: #06101a; border-color: transparent; font-weight: 800; }
    .shell { display: grid; grid-template-columns: minmax(0,1.35fr) minmax(360px,.65fr); gap: 14px; padding: 14px; }
    .panel { border: 1px solid rgba(148,163,184,.22); border-radius: 18px; background: linear-gradient(180deg, rgba(15,23,42,.90), rgba(8,13,25,.94)); box-shadow: 0 20px 60px rgba(0,0,0,.28); overflow: hidden; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(148,163,184,.18); }
    .panel-head h2, .panel-head h3 { margin: 0; font-size: 15px; }
    .panel-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .check-card { border: 1px solid rgba(148,163,184,.18); border-radius: 14px; padding: 14px; background: rgba(15,23,42,.62); display: flex; flex-direction: column; gap: 8px; }
    .check-card.pass { border-color: rgba(34,197,94,.38); background: rgba(34,197,94,.08); }
    .check-card.warn { border-color: rgba(251,146,60,.42); background: rgba(251,146,60,.08); }
    .check-card.fail { border-color: rgba(239,68,68,.45); background: rgba(239,68,68,.08); }
    .metric { display: block; color: var(--muted, #94a3b8); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    .small { color: var(--muted, #94a3b8); font-size: 12px; line-height: 1.5; }
    .pill { display: inline-flex; border-radius: 999px; background: rgba(56,189,248,.12); color: #bae6fd; padding: 4px 8px; font-size: 11px; font-weight: 800; margin: 2px 4px 2px 0; }
    .pill.pass { background: rgba(34,197,94,.13); color: #bbf7d0; }
    .pill.warn { background: rgba(251,146,60,.13); color: #fed7aa; }
    .pill.fail { background: rgba(239,68,68,.13); color: #fecaca; }
    .status, pre { border: 1px solid rgba(148,163,184,.2); border-radius: 14px; background: rgba(2,6,23,.58); padding: 12px; font-size: 12px; color: var(--muted, #cbd5e1); white-space: pre-wrap; overflow: auto; line-height: 1.5; }
    .status.ok { border-color: rgba(34,197,94,.38); color: #bbf7d0; }
    .status.err { border-color: rgba(248,113,113,.45); color: #fecaca; }
    @media (max-width: 1100px) { .shell, .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>System Doctor</h1>
      <p class="subtitle">CUDA, PyTorch, ComfyUI, model/runtime tools, writable paths, and GPU cooling health in one exportable Edison report.</p>
    </div>
    <div class="actions">
      <a class="btn" href="/">Main Chat</a>
      <a class="btn" href="/gpu-fans">GPU Cooling</a>
      <button class="btn" id="cudaBtn">Run CUDA Allocation Check</button>
      <button class="btn primary" id="refreshBtn">Refresh</button>
    </div>
  </header>

  <main class="shell">
    <section class="panel">
      <div class="panel-head"><h2>Diagnostic Checks</h2><span id="summaryPill" class="pill">loading</span></div>
      <div class="panel-body">
        <div id="statusBox" class="status">Loading system diagnostics...</div>
        <div id="checksGrid" class="grid"></div>
      </div>
    </section>

    <aside class="panel">
      <div class="panel-head"><h3>Exportable Report</h3><button class="btn" id="copyBtn">Copy JSON</button></div>
      <div class="panel-body">
        <div id="quickFacts"></div>
        <pre id="reportJson">Loading report...</pre>
      </div>
    </aside>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? '').replace(/[&<>\"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));
    let lastReport = null;

    function statusTone(status) {
      return status === 'pass' ? 'pass' : status === 'warn' ? 'warn' : status === 'fail' ? 'fail' : '';
    }

    function checkCard(check) {
      const tone = statusTone(check.status);
      const details = check.details || {};
      const fix = check.recommended_fix ? `<div class="small"><strong>Fix:</strong> ${esc(check.recommended_fix)}</div>` : '';
      const detailBits = [];
      if (details.python) detailBits.push(`Python: ${details.python}`);
      if (details.path) detailBits.push(`Path: ${details.path}`);
      if (Array.isArray(details.gpus)) detailBits.push(`GPUs: ${details.gpus.length}`);
      if (details.cuda_available !== undefined) detailBits.push(`CUDA available: ${details.cuda_available}`);
      if (details.torch_cuda_version) detailBits.push(`Torch CUDA: ${details.torch_cuda_version}`);
      return `<article class="check-card ${tone}">
        <div><span class="pill ${tone}">${esc(check.status || 'unknown')}</span><span class="metric">${esc(check.key || '')}</span></div>
        <strong>${esc(check.title || check.key)}</strong>
        <div class="small">${esc(check.summary || '')}</div>
        ${detailBits.length ? `<div class="small">${detailBits.map(esc).join('<br>')}</div>` : ''}
        ${fix}
      </article>`;
    }

    function render(payload) {
      const report = payload.report || {};
      lastReport = report;
      const checks = report.checks || [];
      const counts = checks.reduce((acc, check) => {
        acc[check.status || 'unknown'] = (acc[check.status || 'unknown'] || 0) + 1;
        return acc;
      }, {});
      const failed = counts.fail || 0;
      const warned = counts.warn || 0;
      byId('summaryPill').textContent = failed ? `${failed} failing` : warned ? `${warned} warnings` : 'all clear';
      byId('summaryPill').className = `pill ${failed ? 'fail' : warned ? 'warn' : 'pass'}`;
      byId('checksGrid').innerHTML = checks.length ? checks.map(checkCard).join('') : '<div class="status err">No checks returned.</div>';
      byId('reportJson').textContent = JSON.stringify(report, null, 2);
      const coolingCheck = checks.find((check) => check.key === 'cooling') || {};
      const cooling = ((coolingCheck.details || {}).cooling_summary) || {};
      const facts = [
        ['Generated', report.generated_at || 'n/a'],
        ['Platform', (report.platform || {}).system || 'n/a'],
        ['Cooling', cooling.overall_severity || 'n/a'],
        ['Checks', checks.length]
      ];
      byId('quickFacts').innerHTML = facts.map(([k, v]) => `<span class="pill">${esc(k)}: ${esc(v)}</span>`).join('');
      byId('statusBox').textContent = failed ? 'System Doctor found failing checks. Review the recommended fixes before long GPU jobs.' : warned ? 'System Doctor found warnings. Edison can continue, but heavy jobs should review these first.' : 'System Doctor did not find blocking issues in the checks it could run.';
      byId('statusBox').className = `status ${failed ? 'err' : 'ok'}`;
    }

    async function refresh(runCuda = false) {
      byId('statusBox').textContent = runCuda ? 'Running CUDA allocation diagnostics...' : 'Refreshing system diagnostics...';
      const res = await fetch(`/api/system/doctor?run_cuda_allocation=${runCuda ? 'true' : 'false'}`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || data.error || res.statusText);
      render(data);
    }

    document.addEventListener('DOMContentLoaded', () => {
      byId('refreshBtn').addEventListener('click', () => refresh(false).catch((e) => { byId('statusBox').textContent = e.message; byId('statusBox').className = 'status err'; }));
      byId('cudaBtn').addEventListener('click', () => refresh(true).catch((e) => { byId('statusBox').textContent = e.message; byId('statusBox').className = 'status err'; }));
      byId('copyBtn').addEventListener('click', async () => {
        if (!lastReport) return;
        await navigator.clipboard.writeText(JSON.stringify(lastReport, null, 2));
        byId('statusBox').textContent = 'Diagnostic JSON copied to clipboard.';
      });
      refresh(false).catch((e) => { byId('statusBox').textContent = e.message; byId('statusBox').className = 'status err'; });
    });
  </script>
</body>
</html>
